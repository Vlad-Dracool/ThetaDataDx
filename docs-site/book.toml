[book]
title = "ThetaDataDx Documentation"
authors = ["userFRM"]
description = "No-JVM ThetaData Terminal — native Rust SDK documentation"
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/userFRM/ThetaDataDx"
edit-url-template = "https://github.com/userFRM/ThetaDataDx/edit/main/docs-site/src/{path}"

[output.html.search]
enable = true
